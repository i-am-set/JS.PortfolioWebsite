<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Portfolio - Loading...</title>
    <meta name="theme-color" content="#091413">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Portfolio">
    <meta property="og:description" content="Software Engineer Portfolio">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">

    <link href="./css/output.css" rel="stylesheet">
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme {
            --color-background: #091413;
            --color-surface: #112522;
            --color-primary: #408A71;
            --color-secondary: #285A48;
            --color-accent: #B0E4CC;
            --color-text-primary: #E8F5F0;
            --color-text-muted: #8AB4A5;
            --font-display: "Outfit", "Inter", system-ui, sans-serif;
            --animate-float-slow: float 15s ease-in-out infinite;
            --animate-float-fast: float-reverse 12s ease-in-out infinite;
            --animate-pulse-glow: pulse-glow 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;

            @keyframes float {
                0%, 100% {
                    transform: translate(0px, 0px) scale(1);
                }

                33% {
                    transform: translate(5vw, 5vh) scale(1.1);
                }

                66% {
                    transform: translate(-5vw, 10vh) scale(0.9);
                }
            }

            @keyframes float-reverse {
                0%, 100% {
                    transform: translate(0px, 0px) scale(1);
                }

                33% {
                    transform: translate(-5vw, -5vh) scale(1.05);
                }

                66% {
                    transform: translate(5vw, -10vh) scale(0.95);
                }
            }

            @keyframes pulse-glow {
                0%, 100% {
                    opacity: 0.5;
                }

                50% {
                    opacity: 1;
                }
            }
        }
    </style>
</head>
<body class="relative min-h-screen flex flex-col bg-background text-text-primary font-sans antialiased lg:overflow-hidden">

    <!-- Backgrounds -->
    <div class="fixed inset-0 z-[-3] bg-background"></div>
    <div class="fixed inset-0 z-[-2]" style="background-image: linear-gradient(to right, rgba(40, 90, 72, 0.05) 1px, transparent 1px), linear-gradient(to bottom, rgba(40, 90, 72, 0.05) 1px, transparent 1px); background-size: 40px 40px;"></div>

    <!-- Floating Ambient Lights -->
    <div class="fixed inset-0 z-[-1] overflow-hidden pointer-events-none">
        <div class="absolute top-[10%] left-[20%] w-[40vw] h-[40vw] max-w-[500px] max-h-[500px] rounded-full bg-primary/10 blur-[120px] animate-float-slow mix-blend-screen"></div>
        <div class="absolute bottom-[10%] right-[10%] w-[30vw] h-[30vw] max-w-[400px] max-h-[400px] rounded-full bg-accent/10 blur-[100px] animate-float-fast mix-blend-screen"></div>
    </div>

    <!-- Main Bento Dashboard -->
    <main class="flex-grow p-4 md:p-6 lg:p-8 flex flex-col lg:h-screen max-w-[1600px] mx-auto w-full">

        <!-- Minimal Header -->
        <header class="flex justify-between items-center mb-6 shrink-0">
            <div class="text-xl font-display font-bold text-text-primary tracking-tight flex items-center gap-3">
                <div class="w-3 h-3 rounded-full bg-primary animate-pulse-glow"></div>
                <span id="nav-logo">Loading...</span>
            </div>
            <div class="text-sm text-text-muted font-mono flex items-center gap-4">
                <span id="view-count" class="hidden md:inline-block bg-surface/50 px-3 py-1 rounded-full border border-secondary/30">Views: 0</span>
                <button data-consent-preferences class="hover:text-primary transition-colors cursor-pointer">Privacy</button>
            </div>
        </header>

        <!-- Bento Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6 flex-grow auto-rows-[200px] lg:auto-rows-fr">

            <!-- 1. Hero (Spans 2x2) -->
            <div class="bg-surface/60 backdrop-blur-md border border-secondary/30 rounded-3xl p-6 md:p-8 flex flex-col relative overflow-hidden transition-all duration-300 hover:border-primary/50 hover:bg-surface/80 hover:shadow-[0_8px_30px_rgba(64,138,113,0.1)] lg:col-span-2 lg:row-span-2 justify-between">
                <div>
                    <p class="text-primary font-medium mb-2 tracking-widest uppercase text-xs">Welcome</p>
                    <h1 class="text-4xl md:text-5xl lg:text-6xl font-display font-bold text-text-primary mb-4 leading-tight">
                        Hi, I'm <span class="text-transparent bg-clip-text bg-gradient-to-r from-accent to-primary" id="hero-name">...</span>
                    </h1>
                    <h2 class="text-xl md:text-2xl text-text-muted font-light" id="hero-tagline">Software Engineer</h2>
                </div>
                <div class="mt-8 flex gap-3" id="hero-socials">
                    <!-- Injected via JS -->
                </div>
            </div>

            <!-- 2. About (Spans 1x2) -->
            <div class="bg-surface/60 backdrop-blur-md border border-secondary/30 rounded-3xl p-6 md:p-8 flex flex-col relative overflow-hidden transition-all duration-300 hover:border-primary/50 hover:bg-surface/80 hover:shadow-[0_8px_30px_rgba(64,138,113,0.1)] lg:col-span-1 lg:row-span-2">
                <h3 class="text-lg font-display font-bold text-text-primary mb-4 flex items-center gap-2 shrink-0">
                    <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    About Me
                </h3>
                <div class="text-text-muted text-sm leading-relaxed overflow-y-auto pr-2 flex-grow" id="about-bio">
                    Loading bio...
                </div>
            </div>

            <!-- 3. Time Widget (Spans 1x1) -->
            <div class="bg-surface/60 backdrop-blur-md border border-secondary/30 rounded-3xl p-6 md:p-8 flex flex-col relative overflow-hidden transition-all duration-300 hover:border-primary/50 hover:bg-surface/80 hover:shadow-[0_8px_30px_rgba(64,138,113,0.1)] lg:col-span-1 lg:row-span-1 justify-center items-center text-center">
                <p class="text-text-muted text-xs uppercase tracking-widest mb-2">Local Time</p>
                <div class="text-4xl md:text-5xl font-display font-bold text-text-primary tracking-tight mb-1" id="local-time">--:--</div>
                <p class="text-primary text-sm font-mono" id="local-date">Loading...</p>
            </div>

            <!-- 4. Resume Widget (Spans 1x1) -->
            <a href="./assets/resume.pdf" target="_blank" class="bg-surface/60 backdrop-blur-md border border-secondary/30 rounded-3xl p-6 md:p-8 flex flex-col relative overflow-hidden transition-all duration-300 hover:border-primary/50 hover:bg-surface/80 hover:shadow-[0_8px_30px_rgba(64,138,113,0.1)] cursor-pointer group hover:-translate-y-1 lg:col-span-1 lg:row-span-1 justify-center items-center text-center">
                <div class="w-16 h-16 rounded-full bg-primary/10 flex items-center justify-center mb-4 group-hover:bg-primary transition-colors duration-300">
                    <svg class="w-8 h-8 text-primary group-hover:text-background transition-colors duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                </div>
                <h3 class="text-lg font-display font-bold text-text-primary">Resume</h3>
                <p class="text-text-muted text-xs mt-1">View PDF</p>
            </a>

            <!-- 5. Experience Widget (Spans 1x1) -->
            <div id="bento-experience" class="bg-surface/60 backdrop-blur-md border border-secondary/30 rounded-3xl p-6 md:p-8 flex flex-col relative overflow-hidden transition-all duration-300 hover:border-primary/50 hover:bg-surface/80 hover:shadow-[0_8px_30px_rgba(64,138,113,0.1)] cursor-pointer group hover:-translate-y-1 lg:col-span-1 lg:row-span-1 justify-between">
                <div class="flex justify-between items-start">
                    <h3 class="text-lg font-display font-bold text-text-primary">Experience</h3>
                    <svg class="w-5 h-5 text-text-muted group-hover:text-primary transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </div>
                <div id="experience-summary" class="mt-4">
                    <div class="h-4 w-3/4 bg-surface animate-pulse rounded mb-2"></div>
                    <div class="h-3 w-1/2 bg-surface animate-pulse rounded"></div>
                </div>
            </div>

            <!-- 6. Skills Widget (Spans 1x1) -->
            <div id="bento-skills" class="bg-surface/60 backdrop-blur-md border border-secondary/30 rounded-3xl p-6 md:p-8 flex flex-col relative overflow-hidden transition-all duration-300 hover:border-primary/50 hover:bg-surface/80 hover:shadow-[0_8px_30px_rgba(64,138,113,0.1)] cursor-pointer group hover:-translate-y-1 lg:col-span-1 lg:row-span-1 justify-between">
                <div class="flex justify-between items-start mb-4">
                    <h3 class="text-lg font-display font-bold text-text-primary">Top Skills</h3>
                    <svg class="w-5 h-5 text-text-muted group-hover:text-primary transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </div>
                <div id="skills-summary" class="flex flex-wrap gap-2 overflow-hidden h-full content-start">
                    <!-- Injected via JS -->
                </div>
            </div>

            <!-- 7. Projects Widget (Spans 2x1) -->
            <div id="bento-projects" class="bg-surface/60 backdrop-blur-md border border-secondary/30 rounded-3xl flex flex-col relative overflow-hidden transition-all duration-300 hover:border-primary/50 hover:bg-surface/80 hover:shadow-[0_8px_30px_rgba(64,138,113,0.1)] cursor-pointer group hover:-translate-y-1 lg:col-span-2 lg:row-span-1 p-0">
                <div class="absolute inset-0 bg-surface z-10 opacity-60 group-hover:opacity-40 transition-opacity duration-300"></div>
                <div id="projects-bg" class="absolute inset-0 bg-cover bg-center bg-no-repeat transition-transform duration-700 group-hover:scale-105 z-0"></div>

                <div class="relative z-20 p-6 md:p-8 h-full flex flex-col justify-between">
                    <div class="flex justify-between items-start">
                        <span class="px-3 py-1 bg-background/80 backdrop-blur-md border border-secondary/50 rounded-full text-xs font-medium text-accent">Featured Work</span>
                        <div class="w-8 h-8 rounded-full bg-background/80 backdrop-blur-md flex items-center justify-center border border-secondary/50 group-hover:bg-primary group-hover:border-primary transition-colors">
                            <svg class="w-4 h-4 text-text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </div>
                    </div>
                    <div>
                        <h3 class="text-2xl font-display font-bold text-text-primary mb-1" id="projects-title">Projects</h3>
                        <p class="text-text-muted text-sm" id="projects-subtitle">Loading...</p>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Global Modal Overlay -->
    <div id="global-modal" class="fixed inset-0 bg-background/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 md:p-8 opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-surface border border-secondary/50 rounded-3xl w-full max-w-4xl max-h-[90vh] flex flex-col shadow-2xl transform scale-95 transition-transform duration-300">
            <div class="flex justify-between items-center p-6 border-b border-secondary/30 shrink-0">
                <h2 id="modal-title" class="text-2xl font-display font-bold text-text-primary">Title</h2>
                <button id="modal-close" class="text-text-muted hover:text-primary transition-colors p-2 rounded-full hover:bg-surface cursor-pointer">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div id="modal-body" class="p-6 overflow-y-auto flex-grow">
                <!-- Content injected dynamically -->
            </div>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 z-[100] flex flex-col gap-2 pointer-events-none"></div>
    <div id="consent-container"></div>

    <script type="module" src="./js/main.js" defer></script>
</body>
</html>
